name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npm run typecheck

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare VPS directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_ROOT="/opt/compose/tg-trip-watcher"
            DATA_ROOT="/data/tg-trip-watcher"
            mkdir -p "$APP_ROOT" "$DATA_ROOT/data"

      - name: Upload docker compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.deploy.yml
          target: /opt/compose/tg-trip-watcher

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_PHONE_NUMBER: ${{ secrets.TELEGRAM_PHONE_NUMBER }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          MT_PROXY: ${{ vars.MT_PROXY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT || '22' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_NAME,GITHUB_TOKEN,GITHUB_ACTOR,TELEGRAM_API_ID,TELEGRAM_API_HASH,BOT_TOKEN,OPENROUTER_API_KEY,TELEGRAM_PHONE_NUMBER,LOG_LEVEL,MT_PROXY
          script: |
            set -euo pipefail

            APP_ROOT="/opt/compose/tg-trip-watcher"
            cd "$APP_ROOT"

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            docker pull "ghcr.io/${IMAGE_NAME}:latest"

            cat > .env <<EOF
            IMAGE_NAME=${IMAGE_NAME}
            TELEGRAM_API_ID=${TELEGRAM_API_ID}
            TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
            BOT_TOKEN=${BOT_TOKEN}
            OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
            TELEGRAM_PHONE_NUMBER=${TELEGRAM_PHONE_NUMBER:-}
            SQLITE_PATH=/app/data/tours.db
            CONFIG_PATH=/app/data/config.json
            LOG_LEVEL=${LOG_LEVEL:-info}
            MT_PROXY=${MT_PROXY:-}
            EOF
            chmod 600 .env

            cp docker-compose.deploy.yml docker-compose.yml
            docker compose down --remove-orphans || true
            docker compose up -d
            docker image prune -f
