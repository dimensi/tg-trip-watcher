services:
  tg-trip-watcher:
    image: ghcr.io/${IMAGE_NAME}:latest
    container_name: tg-trip-watcher
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /data/tg-trip-watcher/data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
