services:
  tg-trip-watcher:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: tg-trip-watcher
    restart: always
    env_file:
      - .env
    # Required env vars: TELEGRAM_API_ID, TELEGRAM_API_HASH, BOT_TOKEN, OPENROUTER_API_KEY
    # Optional: TELEGRAM_PHONE_NUMBER, SQLITE_PATH, CONFIG_PATH, LOG_LEVEL, MT_PROXY
    volumes:
      - tg_watcher_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  tg_watcher_data:
